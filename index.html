<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFN File Manager</title>
    <!-- Tailwind CSS for clean, quick styling -->
    <script src="https://jsdelivr.net"></script>
    <!-- Supabase CDN to handle backend logic -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-6">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-2">LFN File Dashboard</h1>
        <p class="text-sm text-gray-500 mb-6">User: arthurness | Repo: LFN</p>

        <!-- Configuration Warning -->
        <div id="setup-warning" class="bg-amber-50 border-l-4 border-amber-500 p-4 mb-6">
            <p class="text-amber-700 font-medium">Setup Required</p>
            <p class="text-sm text-amber-600">Please open this HTML file and insert your Supabase URL and API Key in the script section to make uploads work.</p>
        </div>

        <!-- Upload Section -->
        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center mb-8">
            <input type="file" id="file-input" class="hidden" multiple>
            <label for="file-input" class="cursor-pointer bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 inline-block">
                Choose Images or Documents
            </label>
            <p class="text-xs text-gray-400 mt-2">Supports PNG, JPG, PDF, TXT, DOCX</p>
            <div id="upload-status" class="mt-3 text-sm font-medium"></div>
        </div>

        <!-- Files Display Grid -->
        <h2 class="text-xl font-semibold mb-4">Your Stored Files</h2>
        <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            <!-- Files will be injected here by JavaScript -->
            <p class="text-gray-400 italic col-span-full text-center py-4">No files uploaded yet.</p>
        </div>
    </div>

    <script>
        // 1. REPLACE THESE WITH YOUR ACTUAL SUPABASE DETAILS
        const SUPABASE_URL = "https://emvhkhwomcfjfzpiiwto.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtdmhraHdvbWNmamZ6cGlpd3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzE0NTUsImV4cCI6MjA5NTAwNzQ1NX0.d7yet3IzJ0qeyj664j0vzWGjqlv9FeuUiVSvZQscZn8";
        const BUCKET_NAME = "lfn-storage";

        // Hide warning if credentials are changed
        if (SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL") {
            document.getElementById('setup-warning').classList.add('hidden');
        }

        // Initialize Supabase Client
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const fileGrid = document.getElementById('file-grid');
        const uploadStatus = document.getElementById('upload-status');

        // Handle File Selection & Upload
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;

            uploadStatus.className = "mt-3 text-sm font-medium text-blue-600";
            uploadStatus.textContent = "Uploading...";

            for (let file of files) {
                // Create a unique filename to prevent overwrites
                const fileName = `${Date.now()}_${file.name}`;
                
                const { data, error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(fileName, file);

                if (error) {
                    uploadStatus.className = "mt-3 text-sm font-medium text-red-600";
                    uploadStatus.textContent = `Error: ${error.message}`;
                    return;
                }
            }

            uploadStatus.className = "mt-3 text-sm font-medium text-green-600";
            uploadStatus.textContent = "Upload successful!";
            loadFiles();
        });

        // Load and Render Files
        async function loadFiles() {
            if (SUPABASE_URL === "YOUR_SUPABASE_PROJECT_URL") return;

            const { data: files, error } = await supabase.storage
                .from(BUCKET_NAME)
                .list('', { sortBy: { column: 'created_at', order: 'desc' } });

            if (error) {
                console.error("Error fetching files:", error);
                return;
            }

            if (!files || files.length === 0) {
                fileGrid.innerHTML = `<p class="text-gray-400 italic col-span-full text-center py-4">No files stored.</p>`;
                return;
            }

            fileGrid.innerHTML = '';

            files.forEach(file => {
                // Get public download URL
                const { data: urlData } = supabase.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(file.name);
                
                const fileUrl = urlData.publicUrl;
                const isImage = /\.(jpeg|jpg|gif|png|webp)$/i.test(file.name);

                // Create Card Element
                const card = document.createElement('div');
                card.className = "bg-gray-50 border border-gray-200 rounded-lg p-4 flex flex-col justify-between shadow-sm";

                // Preview logic (Image thumbnail vs Document icon)
                let previewHTML = '';
                if (isImage) {
                    previewHTML = `<img src="${fileUrl}" class="w-full h-32 object-cover rounded mb-2" alt="${file.name}">`;
                } else {
                    previewHTML = `
                        <div class="w-full h-32 bg-gray-200 rounded flex flex-col items-center justify-center mb-2 p-2">
                            <span class="text-3xl">📄</span>
                            <span class="text-xs text-gray-500 font-bold mt-1 uppercase">${file.name.split('.').pop()}</span>
                        </div>`;
                }

                card.innerHTML = `
                    <div>
                        ${previewHTML}
                        <p class="text-sm font-medium truncate title="${file.name}">${file.name.split('_').slice(1).join('_') || file.name}</p>
                    </div>
                    <div class="flex gap-2 mt-4 text-xs font-semibold">
                        <a href="${fileUrl}" target="_blank" download class="flex-1 text-center bg-gray-200 text-gray-700 py-1.5 rounded hover:bg-gray-300">View/Get</a>
                        <button onclick="deleteFile('${file.name}')" class="bg-red-50 text-red-600 px-3 py-1.5 rounded border border-red-200 hover:bg-red-100">Delete</button>
                    </div>
                `;
                fileGrid.appendChild(card);
            });
        }

        // Delete File Function
        async function deleteFile(fileName) {
            if (!confirm("Are you sure you want to delete this file?")) return;

            const { data, error } = await supabase.storage
                .from(BUCKET_NAME)
                .remove([fileName]);

            if (error) {
                alert(`Delete failed: ${error.message}`);
            } else {
                loadFiles();
            }
        }

        // Initial Load
        loadFiles();
    </script>
</body>
</html>
